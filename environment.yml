name: dna-ancestry
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python runtime
  - python=3.11

  # Bioinformatics tools (from bioconda)
  # plink: no strict version pin — let bioconda resolve the latest 1.9 build
  - plink                   # PLINK 1.9 (ADMIXTURE-compatible BED format)
  - admixture               # unsupervised ancestry clustering

  # Python scientific stack
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.12
  - matplotlib>=3.8

  # CLI / utility libraries
  - click>=8.1
  - rich>=13.7
  - tqdm>=4.66
  - requests>=2.31

  # Install this project itself via pip
  - pip
  - pip:
    - -e .
